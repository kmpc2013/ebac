# CI/CD do backend FastAPI

name: FastAPI - CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      POETRY_VIRTUALENVS_CREATE: "false"
      POETRY_NO_INTERACTION: "1"
      IMAGE_NAME: fastapi-app
      IMAGE_TAG: latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache Poetry and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --no-root --no-interaction --with dev

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          MEU_USUARIO: admin
          MINHA_SENHA: admin
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_URL: redis://localhost:6379/0
          KAFKA_SERVER: localhost:9094
          ELASTICSEARCH_URL: http://localhost:9200
        run: poetry run pytest

      - name: Build Docker image
        run: docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Run Docker container
        run: |
          docker run -d --name fastapi-app-test -p 8000:8000 \
            -e DATABASE_URL=sqlite:///./data/livros.db \
            -e MEU_USUARIO=admin \
            -e MINHA_SENHA=admin \
            -e REDIS_HOST=127.0.0.1 \
            -e REDIS_PORT=6379 \
            -e REDIS_URL=redis://127.0.0.1:6379/0 \
            -e KAFKA_SERVER=127.0.0.1:9092 \
            -e ELASTICSEARCH_URL=http://127.0.0.1:9200 \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Validate Docker container
        run: |
          for _ in {1..15}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs fastapi-app-test
          exit 1

      - name: Stop Docker container
        if: always()
        run: docker rm -f fastapi-app-test || true
