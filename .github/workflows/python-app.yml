# CI do backend FastAPI

name: FastAPI - CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  POETRY_VIRTUALENVS_CREATE: "false"
  POETRY_NO_INTERACTION: "1"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache Poetry and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --no-root --with dev

      - name: Lint with ruff
        run: poetry run ruff check main.py celery_app.py tasks.py kafka_producer.py tests

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache Poetry and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --no-root --with dev

      - name: Create .env for Docker Compose
        run: |
          echo "DATABASE_URL=sqlite:///./livros.db" > .env
          echo "MEU_USUARIO=admin" >> .env
          echo "MINHA_SENHA=admin" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_URL=redis://redis:6379/0" >> .env
          echo "KAFKA_SERVER=kafka:9092" >> .env

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Start integration dependencies
        run: docker compose up -d redis kafka elasticsearch

      - name: Wait for integration dependencies
        run: docker compose up --wait --wait-timeout 180 redis kafka elasticsearch

      - name: Test with pytest and coverage
        env:
          DATABASE_URL: sqlite:///./test.db
          MEU_USUARIO: admin
          MINHA_SENHA: admin
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_URL: redis://localhost:6379/0
          KAFKA_SERVER: localhost:9094
          ELASTICSEARCH_URL: http://localhost:9200
        run: poetry run python -m pytest --cov=main --cov=tasks --cov=celery_app --cov=kafka_producer --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html:htmlcov

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov

      - name: Stop Docker Compose services
        if: always()
        run: docker compose down -v || true

  container-smoke:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Docker Compose
        run: |
          echo "DATABASE_URL=sqlite:///./livros.db" > .env
          echo "MEU_USUARIO=admin" >> .env
          echo "MINHA_SENHA=admin" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_URL=redis://redis:6379/0" >> .env
          echo "KAFKA_SERVER=kafka:9092" >> .env

      - name: Build and start application stack
        run: docker compose up -d --build redis kafka elasticsearch app celery

      - name: Wait for application stack
        run: docker compose up --wait --wait-timeout 240 redis kafka elasticsearch app celery

      - name: Check API root
        run: curl --fail --silent --show-error http://127.0.0.1:8000/

      - name: Submit async task
        run: curl --fail --silent --show-error -X POST "http://127.0.0.1:8000/calcular/soma?a=2&b=3"

      - name: Verify async task result
        run: |
          for _ in {1..20}; do
            response=$(curl --silent --show-error http://127.0.0.1:8000/tarefas/recentes)
            echo "$response"
            if echo "$response" | grep -q '"status":"SUCCESS"'; then
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Stop Docker Compose services
        if: always()
        run: docker compose down -v || true
