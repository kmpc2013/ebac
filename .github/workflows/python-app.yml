# CI do backend FastAPI

name: FastAPI - CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      POETRY_VIRTUALENVS_CREATE: "false"
      POETRY_NO_INTERACTION: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install dependencies
        run: poetry install --no-root --with dev

      - name: Lint with ruff
        run: poetry run ruff check main.py celery_app.py tasks.py kafka_producer.py tests

  test:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: fastapi-app
      IMAGE_TAG: latest
      POETRY_VIRTUALENVS_CREATE: "false"
      POETRY_NO_INTERACTION: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install dependencies
        run: poetry install --no-root --with dev

      # ─── Docker Compose ────────────────────────────────────────────────
      - name: Create .env file for Docker Compose
        run: |
          echo "DATABASE_URL=sqlite:///./livros.db" > .env
          echo "MEU_USUARIO=admin" >> .env
          echo "MINHA_SENHA=admin" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_URL=redis://redis:6379/0" >> .env
          echo "KAFKA_SERVER=livros-kafka:9092" >> .env

      - name: Start services via Docker Compose
        run: docker compose up -d redis celery kafka

      - name: Wait for services to be healthy
        run: docker compose up --wait --wait-timeout 120 redis celery kafka

      - name: Test with pytest and coverage
        env:
          DATABASE_URL: sqlite:///./test.db
          MEU_USUARIO: admin
          MINHA_SENHA: admin
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          KAFKA_SERVER: localhost:9094
        run: poetry run python -m pytest --cov=main --cov=tasks --cov=celery_app --cov=kafka_producer --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html:htmlcov

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov

      - name: Build Docker image
        run: docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Run Docker container
        run: |
          docker run -d --name fastapi-app-test -p 8000:8000 \
            -e DATABASE_URL=sqlite:///./data/livros.db \
            -e MEU_USUARIO=admin \
            -e MINHA_SENHA=admin \
            -e REDIS_HOST=127.0.0.1 \
            -e REDIS_PORT=6379 \
            -e KAFKA_SERVER=localhost:9092 \
            "${IMAGE_NAME}:${IMAGE_TAG}"

          for _ in {1..15}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi

            sleep 2
          done

          docker logs fastapi-app-test
          exit 1

      - name: Stop Docker container
        if: always()
        run: docker rm -f fastapi-app-test || true

      # ─── Cleanup ───────────────────────────────────────────────────────
      - name: Stop Docker Compose services
        if: always()
        run: docker compose down || true
