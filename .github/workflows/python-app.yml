# CI do backend FastAPI

name: FastAPI - CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('Backend/uv.lock', 'Backend/pyproject.toml') }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint with ruff
        run: uv run ruff check main.py celery_app.py tasks.py kafka_producer.py tests

  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('Backend/uv.lock', 'Backend/pyproject.toml') }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Test with pytest and coverage
        env:
          DATABASE_URL: sqlite:///./test.db
          MEU_USUARIO: admin
          MINHA_SENHA: admin
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: uv run pytest --cov=main --cov=tasks --cov=celery_app --cov=kafka_producer --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html:htmlcov

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            Backend/coverage.xml
            Backend/htmlcov
