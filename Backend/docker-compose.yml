name: ebac

services:
  redis:
    image: redis:latest
    container_name: livros-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
  
  celery:
    build: .
    container_name: livros-celery
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "celery_app:celery_app", "worker", "-Q", "livros", "--loglevel=info"]
    volumes:
      - .:/app
      - celery_venv:/app/.venv
    depends_on:
      - redis
    env_file:
      - .env
    
  app:
    build: .
    environment:
      - DATABASE_URL=sqlite:///./data/livros.db
      - MEU_USUARIO=admin
      - MINHA_SENHA=admin
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_SERVER=livros-kafka:9092
    container_name: livros-app
    ports:
      - "8000:8000"
    volumes:
      - livros_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: livros-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://livros-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@livros-kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    restart: unless-stopped
 
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: livros-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: livros-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: livros-kafka:9092

volumes:
  livros_data:
  celery_venv:
