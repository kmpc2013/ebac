services:
  redis:
    image: redis:latest
    container_name: livros-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
  
  celery:
    build: .
    container_name: livros-celery
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "celery_app:celery_app", "worker", "-Q", "livros", "--loglevel=info"]
    volumes:
      - .:/app
      - celery_venv:/app/.venv
    depends_on:
      - redis
    env_file:
      - .env
    

  api:
    build: .
    environment:
      - DATABASE_URL=sqlite:///./data/livros.db
      - MEU_USUARIO=admin
      - MINHA_SENHA=admin
      - REDIS_URL=redis://redis:6379/0
    container_name: api-livros
    ports:
      - "8000:8000"
    volumes:
      - livros_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  livros_data:
  celery_venv:
