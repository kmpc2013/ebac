name: ebac

services:
  redis:
    image: redis:latest
    container_name: livros-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  celery:
    build: .
    container_name: livros-celery
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "celery_app:celery_app", "worker", "--loglevel=info"]
    volumes:
      - .:/app
      - celery_venv:/app/.venv
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_app:celery_app", "inspect", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    
  app:
    build: .
    environment:
      - DATABASE_URL=sqlite:///./data/livros.db
      - MEU_USUARIO=admin
      - MINHA_SENHA=admin
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_SERVER=livros-kafka:9092
    container_name: livros-app
    ports:
      - "8000:8000"
    volumes:
      - livros_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: livros-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://livros-kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@livros-kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
 
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: livros-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: livros-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: livros-kafka:9092

volumes:
  livros_data:
  celery_venv:
