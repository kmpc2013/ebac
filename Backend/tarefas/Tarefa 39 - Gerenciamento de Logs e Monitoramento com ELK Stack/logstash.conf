input {
  file {
    path => "/var/log/backend/main.log"
    start_position => "beginning"
  }

  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [message] =~ /^\s*[{[]/ {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  grok {
    match => {
      "message" => [
        "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:logger} %{GREEDYDATA:log_message}",
        "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:level}\] %{DATA:logger} - %{GREEDYDATA:log_message}",
        "%{IPORHOST:client_ip}:%{NUMBER:client_port} - \"%{WORD:http_method} %{URIPATHPARAM:http_path} HTTP/%{NUMBER:http_version}\" %{NUMBER:http_status} %{NUMBER:bytes_sent}"
      ]
    }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  if [logger] == "__main__" {
    mutate {
      add_field => { "service" => "backend-main" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "backend-main-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
